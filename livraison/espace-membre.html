<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace membre — zrevents06</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --beige:#F5EDE0;--beige-dark:#E8D9C4;
  --wood:#C4956A;--wood-dark:#8B5E3C;
  --espresso:#3D2314;--honey:#D4A574;
  --cream:#FDF8F2;--warm-white:#FAF6F0;
}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--beige);color:var(--espresso);min-height:100vh;display:flex;flex-direction:column;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem clamp(1rem,4vw,3rem);display:flex;align-items:center;justify-content:space-between;background:rgba(253,248,242,0.94);backdrop-filter:blur(12px);box-shadow:0 4px 30px rgba(61,35,20,0.07);}
.nav-logo img{height:2rem;width:auto;display:block;}
.nav-back{font-size:0.76rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;color:var(--espresso);opacity:0.55;transition:opacity 0.2s,color 0.2s;}
.nav-back:hover{opacity:1;color:var(--wood-dark);}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 3rem;}

.card{width:100%;max-width:480px;background:var(--cream);border-radius:24px;padding:clamp(2rem,5vw,3rem);border:1px solid rgba(196,149,106,0.18);box-shadow:0 20px 60px rgba(61,35,20,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}

.card-icon{font-size:2.8rem;display:block;text-align:center;margin-bottom:0.6rem;filter:drop-shadow(0 4px 12px rgba(196,149,106,0.35));}
.card-title{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,1.9rem);font-weight:700;color:var(--espresso);text-align:center;margin-bottom:0.25rem;}
.card-subtitle{text-align:center;font-size:0.85rem;color:var(--espresso);opacity:0.5;margin-bottom:0.4rem;}
.card-bar{width:50px;height:3px;background:linear-gradient(to right,var(--wood),var(--honey));border-radius:2px;margin:0 auto 2rem;}

.loading{text-align:center;padding:2rem;font-size:0.9rem;color:var(--espresso);opacity:0.55;}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid rgba(61,35,20,0.15);border-top-color:var(--wood);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:0.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}

.profile-section{display:none;}

.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--wood),var(--honey));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--warm-white);margin:0 auto 1.2rem;box-shadow:0 8px 24px rgba(196,149,106,0.35);}

.profile-name{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--espresso);text-align:center;margin-bottom:0.2rem;}
.profile-email{text-align:center;font-size:0.82rem;color:var(--espresso);opacity:0.5;margin-bottom:1.8rem;}

.info-grid{display:grid;gap:0.75rem;margin-bottom:2rem;}
.info-row{background:var(--beige);border-radius:12px;padding:0.9rem 1.1rem;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(196,149,106,0.15);}
.info-label{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;color:var(--wood-dark);opacity:0.7;}
.info-value{font-size:0.88rem;font-weight:600;color:var(--espresso);}

.badge{display:inline-block;padding:0.25rem 0.75rem;border-radius:50px;font-size:0.72rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.badge-verified{background:rgba(39,174,96,0.12);color:#1d8348;border:1px solid rgba(39,174,96,0.2);}
.badge-pending{background:rgba(196,149,106,0.15);color:var(--wood-dark);border:1px solid rgba(196,149,106,0.25);}

.btn-logout{width:100%;padding:0.95rem 1.5rem;background:transparent;color:var(--espresso);border:1.5px solid rgba(61,35,20,0.15);border-radius:50px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.25s;}
.btn-logout:hover{background:rgba(192,57,43,0.06);border-color:rgba(192,57,43,0.3);color:#a93226;}

footer{text-align:center;padding:1.5rem;font-size:0.71rem;color:rgba(61,35,20,0.38);}
</style>
</head>
<body>

<nav aria-label="Navigation principale">
  <a href="/" class="nav-logo" aria-label="Accueil zrevents06"><img src="logos/logo.svg" alt="zrevents06"></a>
  <a href="/" class="nav-back">← Retour au site</a>
</nav>

<main class="page">
  <div class="card" role="main">
    <span class="card-icon" aria-hidden="true">☕</span>
    <h1 class="card-title">Espace membre</h1>
    <p class="card-subtitle">Votre compte zrevents06</p>
    <div class="card-bar" aria-hidden="true"></div>

    <div class="loading" id="loading">
      <span class="spinner" aria-hidden="true"></span>Chargement…
    </div>

    <div class="profile-section" id="profile">
      <div class="avatar" id="avatar-initials" aria-hidden="true"></div>
      <p class="profile-name" id="profile-name"></p>
      <p class="profile-email" id="profile-email"></p>

      <div class="info-grid">
        <div class="info-row">
          <span class="info-label">Statut</span>
          <span class="badge badge-verified" id="badge-statut">✓ Membre</span>
        </div>
      </div>

      <button class="btn-logout" id="btn-logout">Se déconnecter</button>
    </div>
  </div>
</main>

<footer>© <script>document.write(new Date().getFullYear())</script> zrevents06 · Artisan Pâtissier</footer>

<script>
(async () => {
  try {
    const res = await fetch('/api/me');
    if (!res.ok) {
      // Non connecté → rediriger vers connexion
      location.href = '/connexion.html';
      return;
    }
    const user = await res.json();

    // Initiales avatar
    const initiales = (user.prenom || '?').charAt(0).toUpperCase();
    document.getElementById('avatar-initials').textContent = initiales;

    // Infos
    document.getElementById('profile-name').textContent = user.prenom || 'Membre';
    document.getElementById('profile-email').textContent = user.email || '';

    // Afficher le profil
    document.getElementById('loading').style.display = 'none';
    document.getElementById('profile').style.display = 'block';
  } catch {
    location.href = '/connexion.html';
  }
})();

document.getElementById('btn-logout').addEventListener('click', async () => {
  await fetch('/api/deconnexion', { method: 'POST' });
  location.href = '/connexion.html';
});
</script>
</body>
</html>
