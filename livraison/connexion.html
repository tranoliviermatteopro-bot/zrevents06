<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — zrevents06</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --beige:#F5EDE0;--beige-dark:#E8D9C4;
  --wood:#C4956A;--wood-dark:#8B5E3C;
  --espresso:#3D2314;--honey:#D4A574;
  --cream:#FDF8F2;--warm-white:#FAF6F0;
}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--beige);color:var(--espresso);min-height:100vh;display:flex;flex-direction:column;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem clamp(1rem,4vw,3rem);display:flex;align-items:center;justify-content:space-between;background:rgba(253,248,242,0.94);backdrop-filter:blur(12px);box-shadow:0 4px 30px rgba(61,35,20,0.07);}
.nav-logo img{height:2rem;width:auto;display:block;}
.nav-back{font-size:0.76rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;color:var(--espresso);opacity:0.55;transition:opacity 0.2s,color 0.2s;}
.nav-back:hover{opacity:1;color:var(--wood-dark);}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 3rem;}

.auth-card{width:100%;max-width:440px;background:var(--cream);border-radius:24px;padding:clamp(2rem,5vw,3rem);border:1px solid rgba(196,149,106,0.18);box-shadow:0 20px 60px rgba(61,35,20,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}

.auth-icon{font-size:2.8rem;display:block;text-align:center;margin-bottom:0.6rem;filter:drop-shadow(0 4px 12px rgba(196,149,106,0.35));}
.auth-title{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,4vw,2.1rem);font-weight:700;color:var(--espresso);text-align:center;margin-bottom:0.35rem;}
.auth-subtitle{text-align:center;font-size:0.85rem;color:var(--espresso);opacity:0.55;margin-bottom:0.4rem;}
.auth-bar{width:50px;height:3px;background:linear-gradient(to right,var(--wood),var(--honey));border-radius:2px;margin:0 auto 2rem;}

.alert{border-radius:12px;padding:0.9rem 1.1rem;font-size:0.85rem;font-weight:600;margin-bottom:1.2rem;display:none;line-height:1.5;}
.alert.show{display:block;}
.alert-error{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.22);color:#a93226;}
.alert-info{background:rgba(196,149,106,0.1);border:1px solid rgba(196,149,106,0.3);color:var(--wood-dark);}
.alert-success{background:rgba(39,174,96,0.08);border:1px solid rgba(39,174,96,0.22);color:#1d8348;}

.form-group{margin-bottom:1.1rem;}
label.form-label{display:block;font-size:0.69rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--wood-dark);font-weight:700;margin-bottom:0.45rem;}
.form-input{width:100%;background:var(--beige);border:1.5px solid rgba(196,149,106,0.25);border-radius:10px;padding:0.85rem 1rem;font-family:'Nunito',sans-serif;font-size:0.9rem;color:var(--espresso);outline:none;transition:border-color 0.25s,box-shadow 0.25s;}
.form-input::placeholder{color:rgba(61,35,20,0.3);}
.form-input:focus{border-color:var(--wood);box-shadow:0 0 0 4px rgba(196,149,106,0.12);}
.form-input[aria-invalid="true"]{border-color:#C0392B;box-shadow:0 0 0 4px rgba(192,57,43,0.09);}
.form-error{display:none;color:#a93226;font-size:0.75rem;margin-top:0.35rem;font-weight:600;}
.form-error.show{display:block;}

/* Remember me */
.form-check{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem;}
.form-check input[type="checkbox"]{width:18px;height:18px;accent-color:var(--wood);cursor:pointer;flex-shrink:0;border-radius:4px;}
.form-check label{font-size:0.83rem;color:var(--espresso);opacity:0.7;cursor:pointer;user-select:none;}

.forgot-link{display:block;text-align:right;font-size:0.78rem;color:var(--wood);font-weight:600;text-decoration:none;margin-bottom:1rem;transition:color 0.2s;}
.forgot-link:hover{color:var(--wood-dark);}

.btn-submit{width:100%;padding:1rem 1.5rem;background:linear-gradient(135deg,var(--wood),var(--honey));color:var(--warm-white);border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(196,149,106,0.3);}
.btn-submit::after{content:'';position:absolute;top:0;left:-70%;width:40%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);transform:skewX(-20deg);animation:shine 3s ease-in-out infinite;pointer-events:none;}
@keyframes shine{0%{left:-70%;}45%{left:120%;}100%{left:120%;}}
.btn-submit:hover{background:linear-gradient(135deg,var(--honey),var(--wood));box-shadow:0 14px 38px rgba(196,149,106,0.45);transform:translateY(-2px);}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{opacity:0.65;cursor:not-allowed;transform:none;box-shadow:none;}

.auth-links{text-align:center;margin-top:1.5rem;font-size:0.83rem;color:var(--espresso);opacity:0.65;}
.auth-links a{color:var(--wood-dark);font-weight:700;text-decoration:none;transition:color 0.2s;}
.auth-links a:hover{color:var(--wood);}

.divider{display:flex;align-items:center;gap:0.8rem;margin:1.2rem 0;color:var(--espresso);opacity:0.4;font-size:0.78rem;font-weight:600;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(61,35,20,0.15);}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:0.7rem;padding:0.85rem 1.5rem;background:#fff;color:#3c4043;border:1.5px solid rgba(0,0,0,0.12);border-radius:50px;font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-decoration:none;}
.btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:translateY(-1px);background:#f8f8f8;}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(253,248,242,0.4);border-top-color:var(--warm-white);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:0.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{text-align:center;padding:1.5rem;font-size:0.71rem;color:rgba(61,35,20,0.38);}
</style>

<style>
/* ══ FOND ANIMÉ ══ */
body {
  background: var(--espresso) !important;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(196,149,106,0.18) 0%, transparent 55%),

    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139,94,60,0.1) 0%, transparent 60%);
  pointer-events: none;
}
/* grain */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;

  pointer-events: none;
}

/* ══ PARTICULES ══ */

  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4;

/* ══ NAV ══ */

  background: rgba(61,35,20,0.4) !important;
  backdrop-filter: blur(20px) saturate(140%) !important;
  border-bottom: 1px solid rgba(212,165,116,0.12);

/* ══ PAGE ══ */
.page { position: relative; z-index: 1; }

/* ══ AUTH CARD GLASS ══ */
.auth-card {
  background: rgba(253,248,242,0.055) !important;
  backdrop-filter: blur(28px) saturate(160%) !important;
  -webkit-backdrop-filter: blur(28px) saturate(160%) !important;
  border: 1px solid rgba(212,165,116,0.2) !important;
  box-shadow:
    0 32px 80px rgba(20,10,5,0.55),
    0 0 0 1px rgba(212,165,116,0.1),
    inset 0 1px 0 rgba(255,255,255,0.08) !important;
  animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(32px) scale(0.97); }
  to   { opacity:1; transform: translateY(0)     scale(1); }
}

/* ══ TITRE ══ */
.auth-title {
  font-family: 'Cormorant Garamond','Playfair Display',serif !important;
  font-size: clamp(2rem,5vw,2.6rem) !important;
  font-weight: 600 !important;
  color: var(--warm-white) !important;
  letter-spacing: -0.01em;
}
.auth-subtitle { color: rgba(253,248,242,0.55) !important; font-size: 0.88rem !important; }
.auth-bar {
  background: linear-gradient(to right, transparent, var(--honey), transparent) !important;
  width: 60px !important; height: 2px !important; opacity: 0.7;
}
.auth-icon { filter: drop-shadow(0 0 16px rgba(212,165,116,0.6)) !important; }

/* ══ LABELS + INPUTS ══ */
label.form-label { color: rgba(253,248,242,0.55) !important; font-size: 0.66rem !important; letter-spacing: 0.18em !important; }
.form-input {
  background: rgba(253,248,242,0.07) !important;
  border: 1.5px solid rgba(212,165,116,0.18) !important;
  color: var(--warm-white) !important;
  border-radius: 12px !important;

}

  background: rgba(212,165,116,0.1) !important;
  box-shadow: 0 0 0 3px rgba(212,165,116,0.18), 0 0 20px rgba(212,165,116,0.1) !important;
}

/* ══ CHECKBOX ══ */

.forgot-link { color: var(--honey) !important; opacity: 0.8; }
.forgot-link:hover { opacity: 1; }

/* ══ BOUTON SUBMIT ══ */
.btn-submit {
  border-radius: 50px !important;
  font-size: 0.82rem !important;
  letter-spacing: 0.16em !important;
  box-shadow: 0 12px 36px rgba(196,149,106,0.4), 0 0 40px rgba(212,165,116,0.15) !important;
  transition: all 0.28s cubic-bezier(0.22,1,0.36,1) !important;
}

}

/* ══ GOOGLE BTN ══ */
.btn-google {
  background: rgba(255,255,255,0.08) !important;
  border: 1.5px solid rgba(255,255,255,0.15) !important;
  color: rgba(253,248,242,0.85) !important;
  backdrop-filter: blur(8px) !important;
  transition: all 0.25s !important;
}

  background: rgba(255,255,255,0.14) !important;
  border-color: rgba(255,255,255,0.28) !important;
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25) !important;
}

/* ══ DIVIDER ══ */
.divider { color: rgba(253,248,242,0.3) !important; }
.divider::before,.divider::after { background: rgba(253,248,242,0.12) !important; }

/* ══ LINKS ══ */
.auth-links { color: rgba(253,248,242,0.45) !important; }
.auth-links a { color: var(--honey) !important; }
.auth-links a:hover { color: #f0c878 !important; }

/* ══ ALERTS ══ */
.alert-error   { background: rgba(192,57,43,0.15) !important; border-color: rgba(192,57,43,0.3) !important; color: #ff7b72 !important; }
.alert-info    { background: rgba(212,165,116,0.12) !important; color: var(--honey) !important; }
.alert-success { background: rgba(39,174,96,0.12) !important; color: #4caf7d !important; }

/* ══ FOOTER ══ */
footer { color: rgba(253,248,242,0.2) !important; position: relative; z-index: 1; }

/* ══ SELECTION ══ */
::selection { background: rgba(212,165,116,0.35); color: var(--espresso); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--espresso); }
::-webkit-scrollbar-thumb { background: var(--wood); border-radius: 3px; }
</style>

<main class="page">
  <div class="auth-card" role="main">

    <h1 class="auth-title">Bienvenue !</h1>
    <p class="auth-subtitle">Connectez-vous à votre espace membre</p>
    <div class="auth-bar" aria-hidden="true"></div>

    <div class="alert alert-error"   id="alert-error"   role="alert"  aria-live="assertive"></div>
    <div class="alert alert-info"    id="alert-info"    role="status" aria-live="polite"></div>
    <div class="alert alert-success" id="alert-success" role="status" aria-live="polite"></div>

    <form id="form-connexion" novalidate aria-label="Formulaire de connexion">
      <div class="form-group">
        <label class="form-label" for="email">Adresse e-mail</label>
        <input class="form-input" type="email" id="email" name="email"

          aria-describedby="err-email" placeholder="marie@exemple.fr">

      </div>

        <input type="checkbox" id="remember" name="remember">

<script>
const $ = id => document.getElementById(id);

// ── Notifications URL ────────────────────────────────────────────────────────
(function () {
  const params = new URLSearchParams(location.search);
  if (params.get('confirmed') === '1') {
    const el = $('alert-success');
    el.textContent = '✓ Adresse e-mail confirmée ! Vous pouvez vous connecter.';
    el.classList.add('show');
  }
  if (params.get('error') === 'lien_invalide') {
    const el = $('alert-error');
    el.textContent = 'Ce lien de confirmation est invalide ou a déjà été utilisé.';
    el.classList.add('show');
  }
  // Supprimer les params de l'URL sans recharger
  if (params.has('confirmed') || params.has('error')) {
    history.replaceState({}, '', location.pathname);
  }
})();

// ── Validation ───────────────────────────────────────────────────────────────
function setErr(fieldId, errId, msg) {
  $(fieldId).setAttribute('aria-invalid', 'true');
  const el = $(errId);
  el.textContent = msg;
  el.classList.add('show');
}
function clearAll() {
  document.querySelectorAll('.form-error').forEach(e => { e.classList.remove('show'); e.textContent = ''; });
  document.querySelectorAll('.form-input').forEach(i => i.removeAttribute('aria-invalid'));
  ['alert-error','alert-info','alert-success'].forEach(id => $( id).classList.remove('show'));
}
function validate() {
  clearAll();
  let ok = true;
  if (!$('email').value.trim())    { setErr('email',   'err-email',    'E-mail requis.');        ok = false; }
  if (!$('password').value)        { setErr('password','err-password', 'Mot de passe requis.');  ok = false; }
  return ok;
}

// ── Soumission ────────────────────────────────────────────────────────────────
$('form-connexion').addEventListener('submit', async e => {
  e.preventDefault();
  if (!validate()) return;

  const btn = $('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" aria-hidden="true"></span> Connexion…';

  try {
    // ── Vérifier d'abord si c'est un compte admin ─────────────────────────────
    const adminRes = await fetch('/admin/api/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email: $('email').value.trim(), password: $('password').value }),
    });
    if (adminRes.ok) {
      const adminJson = await adminRes.json();
      if (adminJson.success) {
        const el = $('alert-success');
        el.textContent = `✓ Bonjour ${adminJson.admin.nom} ! Accès admin…`;
        el.classList.add('show');
        setTimeout(() => { location.href = '/admin/'; }, 800);
        return;
      }
    }
    // ── Login utilisateur classique ───────────────────────────────────────────
    const res  = await fetch('/api/connexion', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        email:    $('email').value.trim(),
        password: $('password').value,
        remember: String($('remember').checked),
      }),
    });
    const json = await res.json();

    if (!res.ok) {
      const el = $('alert-error');
      el.textContent = json.error || 'Une erreur est survenue.';
      el.classList.add('show');
    } else {
      const el = $('alert-success');
      el.textContent = `✓ Bonjour ${json.prenom} ! Redirection…`;
      el.classList.add('show');
      // Rediriger vers la page précédente ou l'accueil
      const redirect = new URLSearchParams(location.search).get('redirect') || '/';
      setTimeout(() => { location.href = redirect; }, 900);
    }
  } catch {
    const el = $('alert-error');
    el.textContent = 'Erreur réseau. Vérifiez votre connexion.';
    el.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
});
</script>

<script>
(function(){
  const canvas = document.createElement('canvas');
  canvas.id = 'login-canvas';
  document.body.insertBefore(canvas, document.body.firstChild);
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  const N = 40;
  const cols = ['rgba(212,165,116,','rgba(196,149,106,','rgba(240,200,120,','rgba(253,248,242,'];
  function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<N;i++) pts.push({
    x:Math.random()*2000, y:Math.random()*1200,
    r:Math.random()*1.6+0.3,
    vx:(Math.random()-.5)*.15, vy:(Math.random()-.5)*.15-.05,
    a:Math.random()*.45+.1, c:cols[Math.floor(Math.random()*cols.length)],
    ts:Math.random()*.012+.004, td:Math.random()>.5?1:-1
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.a+=p.ts*p.td; if(p.a>.65||p.a<.08) p.td*=-1;
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-5)p.x=W+5; if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5; if(p.y>H+5)p.y=-5;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.c+p.a+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
