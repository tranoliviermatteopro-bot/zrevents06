<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --beige:#F5EDE0;--beige-dark:#E8D9C4;
  --wood:#C4956A;--wood-dark:#8B5E3C;
  --espresso:#3D2314;--honey:#D4A574;
  --cream:#FDF8F2;--warm-white:#FAF6F0;
}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--beige);color:var(--espresso);min-height:100vh;display:flex;flex-direction:column;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem clamp(1rem,4vw,3rem);display:flex;align-items:center;justify-content:space-between;background:rgba(253,248,242,0.94);backdrop-filter:blur(12px);box-shadow:0 4px 30px rgba(61,35,20,0.07);}
.nav-logo img{height:2rem;width:auto;display:block;}
.nav-back{font-size:0.76rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;color:var(--espresso);opacity:0.55;transition:opacity 0.2s,color 0.2s;display:flex;align-items:center;gap:0.4rem;}
.nav-back:hover{opacity:1;color:var(--wood-dark);}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 3rem;}

.auth-card{width:100%;max-width:500px;background:var(--cream);border-radius:24px;padding:clamp(2rem,5vw,3rem);border:1px solid rgba(196,149,106,0.18);box-shadow:0 20px 60px rgba(61,35,20,0.1),0 1px 0 rgba(255,255,255,0.8) inset;}

.auth-icon{font-size:2.8rem;display:block;text-align:center;margin-bottom:0.6rem;filter:drop-shadow(0 4px 12px rgba(196,149,106,0.4));}
.auth-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2rem);font-weight:700;color:var(--espresso);text-align:center;line-height:1.2;margin-bottom:0.4rem;}
.auth-title em{font-style:italic;color:var(--wood);}
.auth-bar{width:50px;height:3px;background:linear-gradient(to right,var(--wood),var(--honey));border-radius:2px;margin:0 auto 2rem;}

.alert{border-radius:12px;padding:0.9rem 1.1rem;font-size:0.85rem;font-weight:600;margin-bottom:1.2rem;display:none;line-height:1.5;}
.alert.show{display:block;}
.alert-error{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.22);color:#a93226;}
.alert-success{background:rgba(39,174,96,0.08);border:1px solid rgba(39,174,96,0.22);color:#1d8348;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1.1rem;}
label.form-label{display:block;font-size:0.69rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--wood-dark);font-weight:700;margin-bottom:0.45rem;}
label.form-label .req{color:var(--honey);margin-left:2px;}
.form-input{width:100%;background:var(--beige);border:1.5px solid rgba(196,149,106,0.25);border-radius:10px;padding:0.85rem 1rem;font-family:'Nunito',sans-serif;font-size:0.9rem;color:var(--espresso);outline:none;transition:border-color 0.25s,box-shadow 0.25s;}
.form-input::placeholder{color:rgba(61,35,20,0.3);}
.form-input:focus{border-color:var(--wood);box-shadow:0 0 0 4px rgba(196,149,106,0.12);}
.form-input[aria-invalid="true"]{border-color:#C0392B;box-shadow:0 0 0 4px rgba(192,57,43,0.09);}
.form-error{display:none;color:#a93226;font-size:0.75rem;margin-top:0.35rem;font-weight:600;}
.form-error.show{display:block;}

.pw-strength{margin-top:0.5rem;}
.pw-bar-track{height:4px;border-radius:4px;background:rgba(196,149,106,0.15);overflow:hidden;}
.pw-bar-fill{height:100%;border-radius:4px;width:0%;transition:width 0.35s cubic-bezier(.22,1,.36,1),background-color 0.3s;}
.pw-label{font-size:0.68rem;font-weight:700;margin-top:0.3rem;min-height:1em;transition:color 0.3s;}

.btn-submit{width:100%;padding:1rem 1.5rem;background:linear-gradient(135deg,var(--wood),var(--honey));color:var(--warm-white);border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-top:0.75rem;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(196,149,106,0.3);}
.btn-submit::after{content:'';position:absolute;top:0;left:-70%;width:40%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);transform:skewX(-20deg);animation:shine 3s ease-in-out infinite;pointer-events:none;}
@keyframes shine{0%{left:-70%;}45%{left:120%;}100%{left:120%;}}
.btn-submit:hover{background:linear-gradient(135deg,var(--honey),var(--wood));box-shadow:0 14px 38px rgba(196,149,106,0.45);transform:translateY(-2px);}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{opacity:0.65;cursor:not-allowed;transform:none;box-shadow:none;}

.auth-links{text-align:center;margin-top:1.5rem;font-size:0.83rem;color:var(--espresso);opacity:0.65;}
.auth-links a{color:var(--wood-dark);font-weight:700;text-decoration:none;transition:color 0.2s;opacity:1;}
.auth-links a:hover{color:var(--wood);}
.divider{display:flex;align-items:center;gap:0.8rem;margin:1.2rem 0;color:var(--espresso);opacity:0.4;font-size:0.78rem;font-weight:600;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(61,35,20,0.15);}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:0.7rem;padding:0.85rem 1.5rem;background:#fff;color:#3c4043;border:1.5px solid rgba(0,0,0,0.12);border-radius:50px;font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-decoration:none;}
.btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:translateY(-1px);background:#f8f8f8;}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(253,248,242,0.4);border-top-color:var(--warm-white);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:0.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{text-align:center;padding:1.5rem;font-size:0.71rem;color:rgba(61,35,20,0.38);font-family:'Nunito',sans-serif;}

@media(max-width:480px){.form-row{grid-template-columns:1fr;}}
</style>

<script>
const $ = id => document.getElementById(id);

// ── Force du mot de passe ────────────────────────────────────────────────────
function measureStrength(pw) {
  let s = 0;
  if (pw.length >= 8)          s++;
  if (pw.length >= 12)         s++;
  if (/[A-Z]/.test(pw))        s++;
  if (/[0-9]/.test(pw))        s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
}
const strengthLevels = [
  { label: '',            color: 'transparent', pct: '0%'   },
  { label: 'Très faible', color: '#C0392B',     pct: '20%'  },
  { label: 'Faible',      color: '#E67E22',     pct: '40%'  },
  { label: 'Correct',     color: '#D4AC0D',     pct: '60%'  },
  { label: 'Fort',        color: '#27AE60',     pct: '80%'  },
  { label: 'Très fort',   color: '#1A7A3C',     pct: '100%' },
];
$('password').addEventListener('input', function () {
  const s   = this.value ? Math.min(measureStrength(this.value), 5) : 0;
  const lvl = strengthLevels[s];
  $('pw-fill').style.width           = lvl.pct;
  $('pw-fill').style.backgroundColor = lvl.color;
  $('pw-label').textContent          = lvl.label;
  $('pw-label').style.color          = lvl.color;
});

// ── Validation / erreurs ─────────────────────────────────────────────────────
function setErr(fieldId, errId, msg) {
  const input = $(fieldId);
  const err   = $(errId);
  err.textContent = msg;
  err.classList.add('show');
  input.setAttribute('aria-invalid', 'true');
}
function clearAll() {
  document.querySelectorAll('.form-error').forEach(e => {
    e.classList.remove('show'); e.textContent = '';
  });
  document.querySelectorAll('.form-input').forEach(i => i.removeAttribute('aria-invalid'));
  $('alert-error').classList.remove('show');
  $('alert-success').classList.remove('show');
}
function validate() {
  clearAll();
  let ok = true;
  const prenom = $('prenom').value.trim();
  const nom    = $('nom').value.trim();
  const email  = $('email').value.trim();
  const pw     = $('password').value;
  const conf   = $('password_confirm').value;

  if (!prenom) { setErr('prenom','err-prenom','Prénom requis.'); ok = false; }
  if (!nom)    { setErr('nom',   'err-nom',   'Nom requis.');    ok = false; }

  if (!email) {
    setErr('email','err-email','E-mail requis.'); ok = false;
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    setErr('email','err-email','Format d\'e-mail invalide.'); ok = false;
  }

  if (!pw) {
    setErr('password','err-password','Mot de passe requis.'); ok = false;
  } else if (pw.length < 8) {
    setErr('password','err-password','8 caractères minimum.'); ok = false;
  }

  if (pw && conf !== pw) {
    setErr('password_confirm','err-confirm','Les mots de passe ne correspondent pas.'); ok = false;
  }

  return ok;
}

// ── Soumission ────────────────────────────────────────────────────────────────
$('form-inscription').addEventListener('submit', async e => {
  e.preventDefault();
  if (!validate()) return;

  const btn = $('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" aria-hidden="true"></span> Création en cours…';

  try {
    const res  = await fetch('/api/inscription', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        prenom:           $('prenom').value.trim(),
        nom:              $('nom').value.trim(),
        email:            $('email').value.trim(),
        password:         $('password').value,
        password_confirm: $('password_confirm').value,
      }),
    });
    const json = await res.json();

    if (!res.ok) {
      const el = $('alert-error');
      el.textContent = json.error || 'Une erreur est survenue.';
      el.classList.add('show');
    } else {
      $('form-inscription').hidden = true;
      const el = $('alert-success');
      el.innerHTML = '✓ Compte créé ! <strong>Vérifiez vos e-mails</strong> pour activer votre compte.';
      el.classList.add('show');
    }
  } catch {
    const el = $('alert-error');
    el.textContent = 'Erreur réseau. Vérifiez votre connexion.';
    el.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Rejoindre zrevents06';
  }
});
