<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Paiement confirmé — zrevents06</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F5EDE0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#FDF8F2;border-radius:16px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(61,35,20,0.12)}
    .icon{font-size:64px;margin-bottom:24px}
    h1{font-family:Georgia,serif;font-size:26px;color:#3D2314;margin-bottom:12px}
    p{color:#3D2314;opacity:0.72;line-height:1.75;font-size:15px;margin-bottom:8px}
    .btn{display:inline-block;margin-top:28px;background:linear-gradient(135deg,#C4956A,#D4A574);color:#FDF8F2;text-decoration:none;font-weight:700;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;padding:14px 36px;border-radius:50px}
    .brand{font-size:12px;color:#3D2314;opacity:0.3;margin-top:32px;letter-spacing:0.2em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Paiement reçu !</h1>
    <p>Merci, votre acompte a bien été encaissé.</p>
    <p>Votre commande est désormais <strong>confirmée</strong>.<br>
       Un e-mail de confirmation vous a été envoyé.</p>
    <p style="margin-top:16px">Notre équipe vous contactera sous <strong>48 h</strong> pour finaliser les détails de votre événement.</p>
    <a class="btn" href="/">Retour au site</a>
    <p class="brand">zrevents06 — Artisan Pâtissier</p>
  </div>
</body>
</html>
